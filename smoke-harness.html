<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>JK smoke harness</title>
  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="viewer.css">
  <style> html,body{margin:0;height:100%} #root{height:100vh} </style>
</head>
<body class="jk-active">
  <div id="root" class="jk-root"></div>
  <!-- stub chrome.storage before any source runs (real ext supplies this; file:// doesn't) -->
  <script>
    window.__mem = {};
    window.chrome = { storage: { local: {
      get(k, cb){ cb({ [k]: window.__mem[k] }); },
      set(o, cb){ Object.assign(window.__mem, o); cb && cb(); },
      remove(k, cb){ delete window.__mem[k]; cb && cb(); },
    } } };
  </script>
  <script src="jsonbig.js"></script>
  <script src="util.js"></script>
  <script src="tree.js"></script>
  <script src="toolbar.js"></script>
  <script src="search.js"></script>
  <script src="rail.js"></script>
  <script src="status.js"></script>
  <script src="core.js"></script>
  <script>
    // A payload that trips every moat + smoke concern at once:
    //  big int (must stay exact), duplicate key (warning), nesting (rail ≥3 top keys),
    //  empty object/array (empty-state), XSS in key AND value (must render as text).
    const SAMPLE = `{
      "id": 136986234663732436,
      "profile": { "reputation": 450, "reputation": 452, "name": "ada" },
      "users": [ { "id": 9007199254740993 }, { "id": 9007199254740995 } ],
      "settings": { "theme": "dark", "nested": { "deep": { "leaf": true } } },
      "empties": { "obj": {}, "arr": [] },
      "<img src=x onerror=alert(1)>": "<script>alert(1)</scr` + `ipt>"
    }`;
    window.JK.mountViewer(document.getElementById("root"), SAMPLE, { showErrors: true });
  </script>
</body>
</html>
