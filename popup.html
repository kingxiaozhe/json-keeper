<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --bg:#ffffff; --bg2:#f7f8fa; --fg:#1c2024; --dim:#6b7280; --faint:#9aa1ac;
      --border:#d3d8de; --accent:#2563eb;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg:#16181c; --bg2:#1b1e23; --fg:#e6e8eb; --dim:#9aa1ac; --faint:#6b7280; --border:#333942; --accent:#4c8dff; }
    }
    * { box-sizing: border-box; }
    body { width: 328px; margin: 0; background: var(--bg); color: var(--fg); font-family: system-ui, sans-serif; }
    .h { padding: 14px 16px 0; }
    .h .t { font-size: 13.5px; font-weight: 680; }
    .h .s { font-size: 11.5px; color: var(--dim); margin-top: 2px; }
    .b { padding: 12px 16px 14px; }
    textarea { width: 100%; height: 118px; box-sizing: border-box; resize: vertical;
      font-family: ui-monospace, Menlo, monospace; font-size: 12px; line-height: 1.5;
      border: 1px solid var(--border); border-radius: 9px; padding: 10px; background: var(--bg2); color: var(--fg); }
    textarea::placeholder { color: var(--faint); }
    .go { width: 100%; margin-top: 10px; padding: 9px 0; font: inherit; font-size: 13px; font-weight: 600;
      border: none; border-radius: 8px; background: var(--accent); color: #fff; cursor: pointer; }
    .hint { font-size: 10.5px; color: var(--faint); line-height: 1.45; margin-top: 9px; }
    .hint code { color: var(--dim); background: var(--bg2); padding: 1px 4px; border-radius: 4px; }
    .foot { display: flex; justify-content: space-between; padding: 10px 16px; border-top: 1px solid var(--border);
      font-size: 10.5px; color: var(--faint); }
    .foot .mono { font-family: ui-monospace, monospace; }
  </style>
</head>
<body>
  <div class="h">
    <div class="t">Paste JSON to format</div>
    <div class="s">or open any .json URL — it auto-formats</div>
  </div>
  <div class="b">
    <textarea id="in" placeholder='{"id": 136986234663732436, "ok": true}' autofocus></textarea>
    <button class="go" id="go">Format JSON →</button>
    <div class="hint">To view local files, enable <code>Allow access to file URLs</code> for this extension in chrome://extensions.</div>
  </div>
  <div class="foot"><span>no ads · open source</span><span class="mono">local-only</span></div>
  <script src="popup.js"></script>
</body>
</html>
